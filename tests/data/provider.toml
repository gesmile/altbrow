# ---------------------------------------------------------------------------
# Remote Provider
# ---------------------------------------------------------------------------

[provider.ipfire]
name     = "IPFire"
location = "remote"
type     = "domain"
enabled  = false

[[provider.ipfire.category]]
name    = "Advertising"
enabled = false
tier    = 3
mapping = ["ads"]
source  = ["https://dbl.ipfire.org/lists/ads/domains.txt"]

[[provider.ipfire.category]]
name    = "DNS-over-HTTPS"
enabled = false
mapping = ["telemetry"]
source  = ["https://dbl.ipfire.org/lists/doh/domains.txt"]

[[provider.ipfire.category]]
name    = "Malware"
tier    = 1
enabled = true
mapping = ["malware"]
source  = ["https://dbl.ipfire.org/lists/malware/domains.txt"]

[[provider.ipfire.category]]
name    = "Phishing"
tier    = 1
enabled = true
mapping = ["malware"]
source  = ["https://dbl.ipfire.org/lists/phishing/domains.txt"]

[[provider.ipfire.category]]
name    = "Social Networks"
enabled = false
mapping = ["social"]
source  = ["https://dbl.ipfire.org/lists/social/domains.txt"]

[provider.mock-domain]

location = "remote"
type = "domain"
enabled = true

[[provider.mock-domain.category]]
enabled = true
mapping = ["ads"]
source = ["http://localhost:8080/ipfire-ads.txt"]


[provider.mock-ip]

location = "remote"
type = "ip"
enabled = true

[[provider.mock-ip.category]]
enabled = true
mapping = ["suspicious"]
source = ["http://localhost:8080/fail2ban.txt"]


