# provider.toml is only used when in ./altbrow.toml is set: `meta.use-provider = true`

[meta]
version = 2
created = "2026-04-13"

# Local (file) Provider 

[provider.fail2ban]

location = "local"
type = "ip"
enabled = false

[[provider.fail2ban.category]]
mapping = ["suspicious"]
source = ["./fail2ban.txt"]


