# Remote Provider

[provider.mock-domain]

location = "remote"
type = "domain"
enabled = true

[[provider.mock-domain.category]]
enabled = true
mapping = ["ads"]
source = ["http://localhost:8080/ipfire-ads.txt"]


[provider.mock-ip]

location = "remote"
type = "ip"
enabled = true

[[provider.mock-ip.category]]
enabled = true
mapping = ["suspicious"]
source = ["http://localhost:8080/fail2ban.txt"]


# DNS Provider 

[provider.opendns]
location = "dns"
type = "domain"
enabled = false
resolver = ["208.67.222.222", "208.67.220.220"]
sinkhole = ["146.112.61.106", "146.112.61.107"]

[[provider.opendns.category]]
name = "OpenDNS Sinkhole"
mapping = ["malware"]


[provider.pihole]
location = "dns"
type = "domain"
enabled = false
resolver = ["10.11.12.171"]
sinkhole = ["0.0.0.0", "::"]   # PiHole default

[[provider.pihole.category]]
name = "PiHole local"
mapping = ["ads"]

