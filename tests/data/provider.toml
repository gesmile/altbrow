# provider.toml is only used when in ./altbrow.toml is set: `meta.use-provider = true`

[meta]
version = 1
created = "2026-04-11"

# Local (file) Provider 

[provider.fail2ban]

location = "local"
type = "ip"
enabled = false

[[provider.fail2ban.category]]
mapping = ["suspicious"]
source = ["./fail2ban.txt"]


# ---------------------------------------------------------------------------
# Inline Domain Providers
# ---------------------------------------------------------------------------

[provider.infrastructure]
location = "inline"
type     = "domain"
enabled  = true

[[provider.infrastructure.category]]
name    = "Semantic Web Standards"
enabled = true
mapping = ["infrastructure"]
source  = [
  "schema.org",
  "schema.googleapis.com",
  "w3.org",
  "w3c.org",
  "purl.org",
  "xmlns.com",
  "rdf.data-vocabulary.org",
  "ogp.me",
  "dublincore.org",
  "json-ld.org",
]

[[provider.infrastructure.category]]
name    = "Web Standards Bodies"
enabled = true
mapping = ["infrastructure"]
source  = [
  "iana.org",
  "mozilla.org",
  "whatwg.org",
]

[provider.cdn]
location = "inline"
