  <!-- social provider hit -->

  <!-- suspicious IP from test list — should hit inlineip/suspicious if resolve-domains=true -->

  <a href="https://www.example-unknown-domain-xyz.com">Unknown domain</a>

  <link rel="alternate" type="application/json" href="https://json-ld.org/spec">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "altbrow test page",
    "description": "Integration test page for altbrow domain and IP classification",
    "url": "http://localhost:18080/test.html",
    "publisher": {
      "@type": "Organization",
      "name": "altbrow test",
      "@id": "https://schema.org/testpage"
    }
  }
  </script>
