[meta]
source = "local"
version = "2025-02-08"
use-provider = true


[output]
explicit_format = "yaml"   # or: "json"

[validation.linked_data]
max_depth = 2
follow_same_domain_only = true
timeout = 3

[validation.schema_org]
allow_unknown_properties = false

[validation.microdata_vs_jsonld]
tolerance = "strict"


[client]
profile = "passive"

# **********************
# * profile definition *
# **********************

[client.defaults]
follow_redirects = true       # follow HTTP 301/302
timeout = 10                  # seconds
fetch_subresources = 0        # raw URL, no external javascript, css
use_session = false
use_header = false
accept_cookies = false
check_cert = true

[client.profiles.passive]
# inherits all defaults — no overrides

[client.profiles.browser]
use_session = true
use_header = true

[client.profiles.consented]
use_session = true
use_header = true
accept_cookies = true
fetch_subresources = 1


# Header definition needs periodic update to appear as a normal browser.
# Applied to all profiles where use_header = true.

[client.headers]
"User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36"
"Accept-Language" = "de-DE,de;q=0.9,en;q=0.8"
# "referer" = "Referer: https://www.google.com/"
